robots:
  cf1:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E701      # <<< CHANGE THIS TO YOUR DRONE
    initial_position: [0.0, 0.0, 0.0]
    type: cf21

robot_types:
  cf21:
    motion_capture:
      enabled: false
      marker: default_single_marker
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

all:
  firmware_logging:
    enabled: true
    default_topics:
      pose:
        frequency: 10
      odom:
        frequency: 10
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2        # Kalman — required for the Flow deck
      controller: 1       # PID — required for the Flow deck
